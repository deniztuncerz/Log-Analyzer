version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: mplus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mplus_logs
      POSTGRES_USER: mplus
      POSTGRES_PASSWORD: mplus_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mplus -d mplus_logs"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
    driver: local
